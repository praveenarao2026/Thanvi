<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambridge IGCSE Combined Science (0653/22) Feb/Mar 2024 Study Tool</title>
    <style>
        :root {
            --primary: #0f172a;
            --primary-accent: #2563eb;
            --primary-light: #f0fdf4;
            --accent-warn: #b45309;
            --success-green: #16a34a;
            --bg-slate: #f8fafc;
            --card-white: #ffffff;
            --border-slate: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-slate);
            color: var(--primary);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-viewport {
            width: 100%;
            max-width: 850px;
            padding: 24px;
            box-sizing: border-box;
        }

        .hero-card {
            background: var(--card-white);
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-slate);
        }

        .hero-card h1 {
            color: var(--primary-accent);
            font-size: 2.1rem;
            margin-bottom: 12px;
        }

        .hero-card p {
            color: #475569;
            font-size: 1.1rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn-action {
            background-color: var(--primary-accent);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        .hidden {
            display: none !important;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: var(--card-white);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-slate);
        }

        .dashboard-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .badge {
            font-weight: 600;
            color: #475569;
            background: #e2e8f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .cards-stack {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .review-card {
            background: var(--card-white);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-slate);
        }

        .card-meta {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .card-question {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #0f172a;
        }

        .options-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        @media(min-width: 650px) {
            .options-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option-node {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 500;
            color: #334155;
            transition: all 0.15s ease;
        }

        .reveal-trigger-area {
            display: flex;
            justify-content: flex-start;
            margin-top: 16px;
        }

        .btn-reveal {
            background: transparent;
            border: 2px solid var(--primary-accent);
            color: var(--primary-accent);
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-reveal:hover {
            background: #eff6ff;
        }

        .revealed .option-node.correct-anchor {
            background-color: #dcfce7;
            border-color: #bbf7d0;
            color: #14532d;
            font-weight: 600;
            position: relative;
        }

        .revealed .option-node.correct-anchor::after {
            content: "✓ Correct";
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            background: var(--success-green);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

        .trap-analysis-container {
            margin-top: 20px;
            padding: 18px;
            background: #fffbeb;
            border-left: 4px solid #d97706;
            border-radius: 0 12px 12px 0;
            font-size: 0.98rem;
            line-height: 1.6;
            color: #451a03;
        }

        .trap-header {
            font-weight: 700;
            color: #9a3412;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .table-render {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.95rem;
        }
        .table-render th, .table-render td {
            border: 1px solid var(--border-slate);
            padding: 10px;
            text-align: center;
        }
        .table-render th {
            background: #f1f5f9;
            color: #334155;
        }
    </style>
</head>
<body>

<div id="app-viewport">
    <!-- Welcome Panel -->
    <div id="welcome-panel" class="hero-card">
        <h1>IGCSE Combined Science Master Plan</h1>
        <p>Interactive Analysis Engine for the <b>0653/22 Feb/Mar 2024</b> Exam Component.<br>Review all 40 questions complete with custom strategic error-traps.</p>
        <button class="btn-action" onclick="initiateDashboard()">Launch Review Interface</button>
    </div>

    <!-- Interactive Dashboard Area -->
    <div id="dashboard-panel" class="hidden">
        <div class="dashboard-header">
            <h2 class="dashboard-title">0653/22 February/March 2024 Master Review</h2>

</div>

<script>
    const examDataset = [
        {
            id: 1,
            text: "A person moves their hand away from a hot object. Which characteristic of living organisms is this verified to be?",
            options: { A: "Growth", B: "Nutrition", C: "Reproduction", D: "Sensitivity" },
            correct: "D",
            trap: "Sensitivity is explicitly defined as the capacity to detect shifts in the external or internal environment and generate an appropriate response. Do not confuse quick motor responses with other fundamental metrics like nutrition or simple homeostasis unless specified."
        },
        {
            id: 2,
            text: "The provided materials show a clear profile layout of a specialized plant cell. Which row accurately names this root structure and maps its core structural purpose?",
            table: `
                <table class="table-render">
                    <tr><th>Row</th><th>Cell Classification</th><th>Primary Physiological Function</th></tr>
                    <tr><td><b>A</b></td><td>Animal cell</td><td>Water and glucose absorption</td></tr>
                    <tr><td><b>B</b></td><td>Animal cell</td><td>Water and ion absorption</td></tr>
                    <tr><td><b>C</b></td><td>Plant cell</td><td>Water and glucose absorption</td></tr>
                    <tr><td><b>D</b></td><td>Plant cell</td><td>Water and ion absorption</td></tr>
                </table>
            `,
            options: { A: "Row A", B: "Row B", C: "Row C", D: "Row D" },
            correct: "D",
            trap: "This is a classic plant cell structural trap. Because root hair cells do not contain chloroplasts, students occasionally confuse them with animal cells. However, they possess a distinct cell wall and large vacuole. Crucially, they absorb water and inorganic mineral ions from soil water, not glucose!"
        },
        {
            id: 3,
            text: "Which class of small foundational biological chemical building blocks are linked together to build proteins?",
            options: { A: "Amino acids", B: "Fatty acids", C: "Glucose", D: "Glycerol" },
            correct: "A",
            trap: "Fatty acids and glycerol associate together to construct lipids. Long chains of glucose build up complex starch, glycogen, or cellulose. Only individual amino acids form peptide bonds to yield complex structured protein columns."
        },
        {
            id: 4,
            text: "An enzyme experiment tracks the breaking down of a starch solution. A student plots 'time taken for enzyme to break down starch' against temperature on a graph. At which designated curve position does the enzyme exhibit its peak functional performance level?",
            options: { 
                A: "Point A (Highest time value at low temp)", 
                B: "Point B (Lowest time value at mid temp)", 
                C: "Point C (Mid-high time value on upward slope)", 
                D: "Point D (Highest time value at high temp)" 
            },
            correct: "B",
            trap: "This is a supreme design trap! The vertical axis displays <b>time taken</b> to clear the substrate, not the reaction rate. Therefore, the lowest spatial point on the valley curve (Point B) indicates the minimum time required, which correlates directly to the absolute maximum rate of enzyme activity."
        },
        {
            id: 5,
            text: "Which explicit dietary component deficiency inside a human nutrition plan directly triggers a structural lack of functional hemoglobin?",
            options: { A: "Calcium", B: "Fats", C: "Iron", D: "Glucose" },
            correct: "C",
            trap: "Calcium structural components are localized to bone and tooth mineralization matrix setups. Iron forms the vital coordination core inside heme complexes to bind molecular oxygen within erythrocytes; its deficiency quickly results in anemia."
        },
        {
            id: 6,
            text: "A diagram charts the structural route of the human alimentary canal and connected organs. Which specific organ creates and delivers all three key digestive enzyme types: amylase, protease, and lipase?",
            options: { A: "Salivary Glands", B: "Stomach", C: "Pancreas", D: "Duodenum / Small Intestine" },
            correct: "C",
            trap: "While the mouth provides amylase and the stomach breaks down proteins via pepsin (protease), the pancreas serves as the master chemical source that synthesizes pancreatic juice containing all three major groups (amylase, protease, and lipase) for delivery into the duodenum."
        },
        {
            id: 7,
            text: "Which statement defines a clear structural or mechanical advantage provided by a double circulation system layout?",
            options: { 
                A: "It allows blood to be pumped to the body and the lungs at completely different pressures.", 
                B: "It allows blood to pass through the heart only once per single complete cycle circuit.", 
                C: "It ensures that the blood moving away from the heart structure is permanently oxygenated.", 
                D: "It forces deoxygenated blood matrices to arrive at systemic liver systems significantly faster." 
            },
            correct: "A",
            trap: "A single circuit sends blood through delicate gas exchange capillaries in the lungs where it drops in pressure before sluggishly moving to the body. A double circulation allows the left ventricle to re-pressurize oxygenated blood strongly for high-pressure systemic delivery while protecting the lungs with lower pressure."
        },
        {
            id: 8,
            text: "What is the complete, chemically balanced molecular symbol equation for standard aerobic respiration?",
            options: { 
                A: "C<sub>6</sub>H<sub>12</sub>O<sub>6</sub> + 2O<sub>2</sub> &rarr; 4CO<sub>2</sub> + 6H<sub>2</sub>O", 
                B: "C<sub>6</sub>H<sub>12</sub>O<sub>6</sub> + 4O<sub>2</sub> &rarr; 6CO<sub>2</sub> + 4H<sub>2</sub>O", 
                C: "C<sub>6</sub>H<sub>12</sub>O<sub>6</sub> + 6O<sub>2</sub> &rarr; 6CO<sub>2</sub> + 2H<sub>2</sub>O", 
                D: "C<sub>6</sub>H<sub>12</sub>O<sub>6</sub> + 6O<sub>2</sub> &rarr; 6CO<sub>2</sub> + 6H<sub>2</sub>O" 
            },
            correct: "D",
            trap: "Ensure that both carbon, hydrogen, and oxygen atoms balance perfectly across both sides. Respiration completely dismantles one mole of glucose using six moles of oxygen gas to leave six carbon dioxide and six water moles as balancing products."
        },
        {
            id: 9,
            text: "Which statements correctly distinguish the directional growth behaviors of tropic responses in plants?",
            options: { 
                A: "Statement 1 (Gravitropism is shoot growth toward light) & Statement 2", 
                B: "Statement 1 & Statement 4", 
                C: "Statement 2 (Gravitropism is root growth downwards) & Statement 3 (Phototropism is shoot growth toward light)", 
                D: "Statement 3 & Statement 4 (Phototropism is root growth downwards)" 
            },
            correct: "C",
            trap: "Do not let the terminology cross wires. Shoots moving toward light is a phototropic reaction. Roots moving downward with the gravitational acceleration vector is a clear manifestation of positive gravitropism."
        },
        {
            id: 10,
            text: "A species of plant features separate male and female flowers on its branches. Which anatomical layout is present in a true male flower?",
            options: { 
                A: "Anthers present, Ovules present, Petals present, Stigma present", 
                B: "Anthers present, Ovules absent, Petals present, Stigma absent", 
                C: "Anthers present, Ovules absent, Petals absent, Stigma absent", 
                D: "Anthers present, Ovules absent, Petals present, Stigma present" 
            },
            correct: "B",
            trap: "Male floral components isolate reproductive duties to the stamen (anther and filament). Carpel components (stigma, style, ovary, and internal ovules) belong exclusively to female flowers. Petals are kept to attract pollinators."
        },
        {
            id: 11,
            text: "Which row correctly correlates the biological modifications present in human egg cells versus human sperm cells?",
            options: { 
                A: "Egg cells: internal energy stores present | Sperm cells: specialized acrosome enzymes present", 
                B: "Egg cells: specialized enzymes present | Sperm cells: internal energy stores present", 
                C: "Egg cells: produced in immense counts | Sperm cells: flagellum structures present", 
                D: "Egg cells: flagellum structures present | Sperm cells: produced in immense counts" 
            },
            correct: "A",
            trap: "Egg cells contain a large cytoplasm that acts as an energy store to support the early embryo. Sperm cells carry an acrosome packed with enzymes at the head tip to digest through the protective jelly coat of the egg."
        },
        {
            id: 12,
            text: "Which directional sequence outlines a scientifically valid food chain structure?",
            options: { 
                A: "Cat &rarr; Bird &rarr; Snail &rarr; Grass", 
                B: "Grass &rarr; Snail &rarr; Bird &rarr; Cat", 
                C: "Grass &larr; Snail &larr; Bird &larr; Cat", 
                D: "Grass &rarr; Bird &rarr; Snail &rarr; Cat" 
            },
            correct: "B",
            trap: "Arrows in a food web or chain explicitly depict the <b>flow of chemical energy and biomass</b> from the consumed organism to the consumer. Chains must start with a primary producer (Grass) and show energy flowing toward top predators."
        },
        {
            id: 13,
            text: "Which stage within the global carbon cycle serves as the single biological mechanism for removing free carbon dioxide directly from the atmosphere?",
            options: { A: "Combustion", B: "Decomposition", C: "Photosynthesis", D: "Respiration" },
            correct: "C",
            trap: "Combustion, respiration, and decomposition reactions all oxidize carbon compounds and release carbon dioxide back into the atmosphere. Only photosynthesis fixes gaseous carbon dioxide into organic carbohydrates."
        },
        {
            id: 14,
            text: "A rigid, tightly closed steel container holds a fixed mass of gas. What mechanical changes occur inside the container when its ambient temperature is increased?",
            options: { 
                A: "Gas particles slow down and measured pressure drops.", 
                B: "Gas particles speed up and measured pressure drops.", 
                C: "Gas particles speed up and measured pressure increases.", 
                D: "Gas particles condense into liquid variants and pressure increases." 
            },
            correct: "C",
            trap: "Thermal energy inputs convert directly into kinetic energy for the gas molecules. As they speed up, they collide more frequently and with greater force against the rigid container walls, causing an increase in pressure."
        },
        {
            id: 15,
            text: "Fluorine and chlorine occupy consecutive positions within Group VII of the Periodic Table. Which value increases by exactly eight when moving down from fluorine to chlorine?",
            options: { 
                A: "The number of covalent atoms inside one molecule", 
                B: "The total number of electrons within one isolated atom", 
                C: "The total number of electrons bound inside a diatomic molecule", 
                D: "The absolute number of nucleons inside the atomic nucleus" 
            },
            correct: "B",
            trap: "Both elements form diatomic molecules (F<sub>2</sub>, Cl<sub>2</sub>), so the atom count per molecule stays constant at two. Moving down Period 2 to Period 3 within Group VII adds a full shell of 8 electrons, increasing the atomic number (electron count) from 9 to 17."
        },
        {
            id: 16,
            text: "Which structural description concerning solid sodium chloride (NaCl) crystal structures is true?",
            options: { 
                A: "It contains chloride ions built when chlorine atoms drop electrons.", 
                B: "It is composed of metallic atoms sharing valence electrons with non-metals.", 
                C: "Electrostatic attractions between opposite charges yield a giant ionic lattice.", 
                D: "Strong covalent networks link neutral sodium and chlorine atoms together." 
            },
            correct: "C",
            trap: "Avoid blending chemical descriptions. Sodium chloride is ionic, not covalent or metallic. It forms a giant regular array (lattice) held together by multi-directional electrostatic attractions between positive sodium ions ($Na^+$) and negative chloride ions ($Cl^-$)."
        },
        {
            id: 17,
            text: "An ionic compound contains polyatomic ammonium ions (NH<sub>4</sub><sup>+</sup>) and thiosulfate ions (S<sub>2</sub>O<sub>3</sub><sup>2-</sup>). What is the correct empirical formula for this salt?",
            options: { A: "NH<sub>4</sub>S<sub>2</sub>O<sub>3</sub>", B: "NH<sub>4</sub>(S<sub>2</sub>O<sub>3</sub>)<sub>2</sub>", C: "(NH<sub>4</sub>)<sub>2</sub>S<sub>2</sub>O<sub>3</sub>", D: "2NH<sub>4</sub>S<sub>2</sub>O<sub>3</sub>" },
            correct: "C",
            trap: "To ensure overall electrical neutrality, the single positive charge on each ammonium ion ($1+$) must balance the double negative charge on the thiosulfate ion ($2-$). This requires two ammonium units, enclosed in parentheses, for every one thiosulfate unit."
        },
        {
            id: 18,
            text: "Which statement describing the chemical properties of the electrolysis of a molten binary metal halide is correct?",
            options: { 
                A: "Positively charged cations migrate directly toward the positive anode.", 
                B: "Free valence electrons pass directly through the liquid electrolyte matrix.", 
                C: "Halide ions gain extra protons at the cathode interface.", 
                D: "Negative halide anions lose electrons (oxidation) at the positive anode." 
            },
            correct: "D",
            trap: "Conduction within a liquid electrolyte relies on the movement of mobile ions, not free electrons. Negatively charged anions flow toward the positive anode, where they lose electrons (oxidation) to form neutral halogen molecules."
        },
        {
            id: 19,
            text: "An energy profile diagram for a chemical reaction displays a step up from reactants to products. Which interval represents the true activation energy ($E_a$) of the process?",
            options: { 
                A: "The energy gap from the reactant base line up to the peak of the curve", 
                B: "The total energy gap between the products line and the peak of the curve", 
                C: "The net energy difference between the initial reactants and final products", 
                D: "The absolute distance from the zero energy floor to the products line" 
            },
            correct: "A",
            trap: "Activation energy ($E_a$) is always defined as the minimum energy required to initiate a reaction. It is measured on a profile graph from the starting reactant energy level up to the highest point of the transition state curve."
        },
        {
            id: 20,
            text: "Hydrogen gas reacts with iodine vapor to produce hydrogen iodide. Why does the rate of this chemical reaction increase when the temperature is raised?",
            options: { 
                A: "The molecules pack closer together, which increases collision frequency.", 
                B: "The required activation energy value drops dynamically at higher temperatures.", 
                C: "The molecules travel faster, which increases the reaction's activation energy requirement.", 
                D: "A higher proportion of reactant molecules possess energy $\\ge E_a$, leading to more successful collisions." 
            },
            correct: "D",
            trap: "Be careful with wording here. Raising the temperature does not alter the actual activation energy barrier itself (B), nor does it pack molecules closer together (A). Instead, it increases the kinetic energy of the molecules, meaning a much larger fraction of collisions meet or exceed the energy threshold required to react."
        },
        {
            id: 21,
            text: "Consider the redox reaction: CuO + H<sub>2</sub> &rarr; Cu + H<sub>2</sub>O. Which analytical statement is correct?",
            options: { 
                A: "Both copper(II) oxide and hydrogen molecules undergo simultaneous oxidation.", 
                B: "Copper(II) oxide acts as a reducing agent.", 
                C: "Copper(II) oxide loses oxygen and is reduced during the reaction.", 
                D: "Hydrogen acts as an oxidizing agent." 
            },
            correct: "C",
            trap: "Copper(II) oxide loses its oxygen atom to hydrogen, meaning it is reduced; this makes it the oxidizing agent. Hydrogen gains oxygen (is oxidized), acting as the reducing agent."
        },
        {
            id: 22,
            text: "Which statement describes the trend in properties across a single horizontal period of the Periodic Table?",
            options: { 
                A: "Metals are located on the left and non-metals sit on the right of the period.", 
                B: "Metals are on the far margins with non-metals localized to the middle.", 
                C: "Non-metals sit on the left margin and metals occupy the right margin.", 
                D: "Elements cycle randomly between metallic and non-metallic states." 
            },
            correct: "A",
            trap: "Periods run horizontally. Elements transition systematically from highly electropositive metals on the left (Group I, II) through metalloids, to electronegative non-metals on the right (Group VII, VIII)."
        },
        {
            id: 23,
            text: "An unknown solid block X is placed into an open gap within an electric test circuit. The indicator lamp lights up immediately. What is the identity of solid material X?",
            options: { A: "An insulating covalent compound", B: "A metallic alloy", C: "A liquid electrolyte salt solution", D: "A solid crystalline salt" },
            correct: "B",
            trap: "Solid crystalline salts (D) lock their ions into fixed lattice positions, meaning they cannot conduct electricity until molten or dissolved. Covalent compounds lack mobile charge carriers. Only metallic structures, like alloys, conduct electricity in the solid state due to their delocalized sea of electrons."
        },
        {
            id: 24,
            text: "The industrial extraction of iron inside a blast furnace relies on three primary reactions. Which substance serves as a product in one step and a reactant in another?",
            options: { A: "Elemental carbon", B: "Carbon dioxide gas", C: "Iron(III) oxide", D: "Oxygen gas" },
            correct: "B",
            trap: "Carbon dioxide ($CO_2$) is produced first by burning coke: $C + O_2 \rightarrow CO_2$. This product then reacts with more hot coke to form carbon monoxide: $CO_2 + C \rightarrow 2CO$. The carbon monoxide then acts as the main reducing agent for the iron ore."
        },
        {
            id: 25,
            text: "Which municipal treatment steps are used to clean water before it enters the public supply?",
            options: { 
                A: "Process 1 (Chlorination) and Process 3 (Filtration)", 
                B: "Process 1 and Process 4 (Precipitation)", 
                C: "Process 2 (Crystallisation) and Process 3", 
                D: "Process 2 and Process 4" 
            },
            correct: "A",
            trap: "Filtration removes insoluble suspended solids like sand and grit. Chlorination adds chlorine gas to destroy harmful microorganisms and bacteria. Processes like crystallization are separation techniques for soluble salts and are not used in large-scale water treatment."
        },
        {
            id: 26,
            text: "Which pair of environmental exposures are required for iron to undergo corrosion (rusting)?",
            options: { A: "Nitrogen gas and water vapor", B: "Nitrogen gas and dissolved oxygen", C: "Oxygen gas and sodium chloride salt", D: "Oxygen gas and water" },
            correct: "D",
            trap: "While salt can accelerate the speed of corrosion (C), it is not an absolute requirement. Iron requires both oxygen and water to form hydrated iron(III) oxide (rust). Excluding either water or oxygen will prevent rusting entirely."
        },
        {
            id: 27,
            text: "The thermal cracking of octacosane is modeled as: C<sub>28</sub>H<sub>58</sub> &rarr; C<sub>10</sub>H<sub>22</sub> + [Product 1] + [Product 2]. Which pair represents two possible products that satisfy chemical balancing?",
            options: { 
                A: "C<sub>4</sub>H<sub>10</sub> and C<sub>14</sub>H<sub>28</sub>", 
                B: "C<sub>6</sub>H<sub>14</sub> and C<sub>11</sub>H<sub>22</sub>", 
                C: "C<sub>10</sub>H<sub>20</sub> and C<sub>8</sub>H<sub>18</sub>", 
                D: "C<sub>12</sub>H<sub>24</sub> and C<sub>6</sub>H<sub>12</sub>" 
            },
            correct: "D",
            trap: "The total atom count must balance exactly: $28 - 10 = 18$ Carbon atoms remaining, and $58 - 22 = 36$ Hydrogen atoms remaining. Option D provides $C_{12}H_{24} + C_6H_{12}$, which sums to exactly 18 Carbons and 36 Hydrogens while forming valid alkenes."
        },
        {
            id: 28,
            text: "A speed-time graph displays a perfectly straight horizontal line above the zero line. What does this reveal about the motion of the car?",
            options: { A: "The vehicle is accelerating uniformly.", B: "The vehicle is completely at rest.", C: "The vehicle is decelerating.", D: "The vehicle is traveling at a constant speed." },
            correct: "D",
            trap: "Do not confuse speed-time graphs with distance-time graphs. A horizontal line on a *distance-time* graph means the object is stationary. On a *speed-time* graph, it means the speed value is unchanging over time, indicating a constant velocity."

    function initiateDashboard() {
        document.getElementById('welcome-panel').classList.add('hidden');
        document.getElementById('dashboard-panel').classList.remove('hidden');
        generateReviewNodes();
    }

    function generateReviewNodes() {
        const insertionTarget = document.getElementById('cards-stack-target');
        insertionTarget.innerHTML = '';

        examDataset.forEach((node) => {
            const block = document.createElement('div');
            block.className = 'review-card';
            block.id = `node-block-${node.id}`;

            let contextualTable = node.table ? node.table : '';

            block.innerHTML = `
                <div class="card-meta">System Core Unit ${node.id}</div>
                <div class="card-question">${node.text}</div>
                ${contextualTable}
                <div class="options-layout">
                    <div class="option-node ${node.correct === 'A' ? 'correct-anchor' : ''}"><b>A:</b> ${node.options.A}</div>
                    <div class="option-node ${node.correct === 'B' ? 'correct-anchor' : ''}"><b>B:</b> ${node.options.B}</div>
                    <div class="option-node ${node.correct === 'C' ? 'correct-anchor' : ''}"><b>C:</b> ${node.options.C}</div>
                    <div class="option-node ${node.correct === 'D' ? 'correct-anchor' : ''}"><b>D:</b> ${node.options.D}</div>
                </div>
                <div class="reveal-trigger-area">
                    <button class="btn-reveal" onclick="triggerNodeReveal(${node.id}, this)">Evaluate System Parameters</button>
                </div>
                <div class="trap-analysis-container hidden" id="trap-box-${node.id}">
                    <div class="trap-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        Strategic Error-Trap Analysis
                    </div>
                    <div>${node.trap}</div>
                </div>
            `;
            insertionTarget.appendChild(block);
        });
    }

    function triggerNodeReveal(id, element) {
        const baseBlock = document.getElementById(`node-block-${id}`);
        const structuralBox = document.getElementById(`trap-box-${id}`);
        
        baseBlock.classList.add('revealed');
        structuralBox.classList.remove('hidden');
        element.classList.add('hidden');
    }
</script>
