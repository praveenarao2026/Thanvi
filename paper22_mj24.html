<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambridge IGCSE Combined Science (0653/22) May/June 2024 Study Tool</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #eff6ff;
            --accent: #d97706;
            --success: #15803d;
            --dark: #1e293b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            width: 100%;
            max-width: 850px;
            padding: 24px;
            box-sizing: border-box;
        }

        .welcome-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .welcome-card h1 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 12px;
        }

        .welcome-card p {
            color: #475569;
            font-size: 1.15rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn-start {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.25);
        }

        .btn-start:hover {
            background-color: #172554;
            transform: translateY(-1px);
        }

        .hidden {
            display: none !important;
        }

        /* Header Elements */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: var(--card-bg);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .quiz-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .progress-badge {
            font-weight: 600;
            color: #475569;
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* Question Cards Layout */
        .question-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
        }

        .q-meta {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #0f172a;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        @media(min-width: 650px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 500;
            color: #334155;
            transition: all 0.15s ease;
        }

        .action-area {
            display: flex;
            justify-content: flex-start;
            margin-top: 16px;
        }

        .btn-reveal {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-reveal:hover {
            background: var(--primary-light);
        }

        /* Post-Reveal Active Card States */
        .revealed .option-item.correct {
            background-color: #dcfce7;
            border-color: #bbf7d0;
            color: #14532d;
            font-weight: 600;
            position: relative;
        }

        .revealed .option-item.correct::after {
            content: "✓ Correct Answer";
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            background: var(--success);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

        .analysis-box {
            margin-top: 20px;
            padding: 18px;
            background: #fffbeb;
            border-left: 4px solid var(--accent);
            border-radius: 0 12px 12px 0;
            font-size: 0.98rem;
            line-height: 1.6;
            color: #451a03;
        }

        .analysis-title {
            font-weight: 700;
            color: #9a3412;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Tabular Layout Component Helpers */
        .sub-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.95rem;
        }
        .sub-table th, .sub-table td {
            border: 1px solid var(--border);
            padding: 10px;
            text-align: center;
        }
        .sub-table th {
            background: #f1f5f9;
            color: #334155;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="welcome-screen" class="welcome-card">
        <h1>IGCSE Combined Science</h1>
        <p>Interactive Study & Error-Trap Analyzer<br>Reviewing all 40 questions from the <b>0653/22 May/June 2024</b> examination paper.</p>
        <button class="btn-start" onclick="startReview()">Start Review</button>
    </div>

    <div id="review-screen" class="hidden">
        <div class="quiz-header">
            <h2 class="quiz-title">0653/22 May/June 2024 Exam Master Plan</h2>
            <span class="progress-badge">40 Interactive Cards</span>
        </div>

        <div id="questions-list" class="question-container">
            </div>
    </div>
</div>

<script>
    const quizData = [
        {
            id: 1,
            text: "The diagram of a typical plant cell identifies external structures. Which part of the cell controls the movement of materials into and out of the cell?",
            options: { A: "Cell membrane", B: "Cell wall", C: "Cytoplasm", D: "Large central vacuole" },
            correct: "A",
            trap: "Do not confuse structural borders with active barriers. The cell wall (B) is completely permeable and structurally rigid, serving to protect and keep structural pressure stable. The cell membrane (A) is the true partially permeable lipid layer that actively determines entry and exit parameters for ions and chemical compounds."
        },
        {
            id: 2,
            text: "Molecules can move into and out of biological cellular systems. Which row accurately sets out the net movement criteria for both diffusion and osmosis?",
            table: `
                <table class="sub-table">
                    <tr><th>Row</th><th>Diffusion Net Movement Parameters</th><th>Osmosis Net Movement Parameters</th></tr>
                    <tr><td><b>A</b></td><td>Lower to higher concentration</td><td>Lower to higher water potential</td></tr>
                    <tr><td><b>B</b></td><td>Lower to higher concentration</td><td>Higher to lower water potential</td></tr>
                    <tr><td><b>C</b></td><td>Higher to lower concentration</td><td>Lower to higher water potential</td></tr>
                    <tr><td><b>D</b></td><td>Higher to lower concentration</td><td>Higher to lower water potential</td></tr>
                </table>
            `,
            options: { A: "Row A", B: "Row B", C: "Row C", D: "Row D" },
            correct: "D",
            trap: "Both passive processes always drive movement down a net thermodynamic concentration gradient (from a region of higher concentration to lower concentration). For osmosis, this specifically means the passive shift of free water molecules from an area of higher water potential (dilute solution) to a lower water potential (concentrated solution)."
        },
        {
            id: 3,
            text: "Which statement describing the functional profile of biological catalysts is correct?",
            options: { 
                A: "Enzymes are carbohydrates that alter reaction rates.", 
                B: "Enzymes are proteins that function as biological catalysts.", 
                C: "Enzymes speed up metabolic rates and are consumed during the chemical step.", 
                D: "Enzymes can only operate inside active metabolic cells." 
            },
            correct: "B",
            trap: "A common pitfall is identifying enzymes as structural carbohydrates or believing that they are altered or consumed during the chemical cycle (C). Remember: they are structural proteins that remain structurally unchanged and ready to bind a new substrate molecule immediately after catalysis."
        },
        {
            id: 4,
            text: "A student reviews the fundamental environmental inputs required for a plant to initiate photosynthesis. Which chemical combination must be present for a green plant to manufacture carbohydrates?",
            options: { 
                A: "Carbon dioxide, oxygen, and chlorophyll", 
                B: "Carbon dioxide, water, and oxygen", 
                C: "Carbon dioxide, water, light energy, and chlorophyll", 
                D: "Oxygen, water, light energy, and chlorophyll" 
            },
            correct: "C",
            trap: "Watch out for oxygen (A, B, D). Oxygen is a gaseous byproduct of photosynthesis, not a starting reactant. Carbon dioxide and water are the raw inputs configured via light capture inside chloroplasts containing chlorophyll."
        },
        {
            id: 5,
            text: "A balanced human diet requires correct proportions of mineral ions and vitamins. Which deficiency condition is correctly matched with the missing nutrient component?",
            options: { 
                A: "Vitamin D deficiency causes rickets", 
                B: "Vitamin C deficiency causes iron-deficiency anemia", 
                C: "Calcium deficiency prevents normal oxygen transport", 
                D: "Iron deficiency leads to soft bone tissue configurations" 
            },
            correct: "A",
            trap: "Nutrient pairings can easily be flipped under pressure. Iron is essential for hemoglobin (oxygen transport), so its deficiency causes anemia. Calcium and Vitamin D are responsible for healthy bone mineralization; a lack of Vitamin D directly hinders calcium absorption, leading to rickets."
        },
        {
            id: 6,
            text: "The diagram displays a transverse cross-section of a plant stem. Which plant tissue manages the transport of water and mineral ions, and where is it located relative to the vascular bundle?",
            options: { 
                A: "Phloem, located on the outer edge of the bundle", 
                B: "Xylem, located on the inner edge of the bundle", 
                C: "Phloem, located on the inner edge of the bundle", 
                D: "Xylem, located on the outer edge of the bundle" 
            },
            correct: "B",
            trap: "Remember 'Phloem is Outside, Xylem is Inside' (P-O, X-I) in a typical stem vascular layout. Xylem is structurally reinforced to pull water upwards from the root system, positioning itself inward."
        },
        {
            id: 7,
            text: "A study tracks blood transit through the human circulatory path. Which structural sequence represents the flow of a single red blood cell leaving the lungs and heading towards the body tissues?",
            options: { 
                A: "Pulmonary artery &rarr; Right atrium &rarr; Right ventricle &rarr; Aorta", 
                B: "Pulmonary vein &rarr; Right atrium &rarr; Right ventricle &rarr; Vena cava", 
                C: "Pulmonary vein &rarr; Left atrium &rarr; Left ventricle &rarr; Aorta", 
                D: "Pulmonary artery &rarr; Left atrium &rarr; Left ventricle &rarr; Vena cava" 
            },
            correct: "C",
            trap: "Oxygenated blood returns from the respiratory tissue via the pulmonary vein. It enters the left side of the heart (left atrium to left ventricle) to be pumped into systemic circulation through the aorta. The right side manages deoxygenated blood returning from the body tissues."
        },
        {
            id: 8,
            text: "What are the chemical differences in gas percentages when comparing inspired air with expired air passing through human lungs?",
            options: { 
                A: "Expired air contains more oxygen and less carbon dioxide than inspired air.", 
                B: "Expired air contains more oxygen and more water vapor than inspired air.", 
                C: "Expired air contains less carbon dioxide and less water vapor than inspired air.", 
                D: "Expired air contains less oxygen and more carbon dioxide than inspired air." 
            },
            correct: "D",
            trap: "Internal cell respiration consistently uses up oxygen and creates carbon dioxide. Therefore, exhaled gas always shows a drop in oxygen levels and a rise in carbon dioxide and water vapor content."
        },
        {
            id: 9,
            text: "Which statement accurately describes aerobic respiration?",
            options: { 
                A: "It produces lactic acid in animal muscle cells.", 
                B: "It does not require oxygen to release energy.", 
                C: "It occurs entirely within the cell nucleus.", 
                D: "It is the cellular release of a relatively large amount of energy from glucose using oxygen." 
            },
            correct: "D",
            trap: "Lactic acid generation is an anaerobic pathway found in over-exerted muscles. Aerobic pathways utilize oxygen to break down glucose completely, yielding carbon dioxide, water, and a much larger amount of energy."
        },
        {
            id: 10,
            text: "A plant shoot exhibits growth curvature toward a light source coming from one side. What is the name of this response and how does auxin coordinate it?",
            options: { 
                A: "Negative phototropism; auxin breaks down on the illuminated side.", 
                B: "Positive gravitropism; auxin concentrates on the shaded side.", 
                C: "Positive phototropism; auxin concentrates on the shaded side to cause cell elongation.", 
                D: "Negative gravitropism; auxin moves to the illuminated side to restrict cell growth." 
            },
            correct: "C",
            trap: "Growth toward light is *positive phototropism*. Auxin migrates to the shaded side of the shoot tip, causing the cells on that side to elongate faster. This uneven growth rate bends the plant toward the light source."
        },
        {
            id: 11,
            text: "Which row accurately matches an advantage and a disadvantage of asexual reproduction for a plant species in the wild?",
            table: `
                <table class="sub-table">
                    <tr><th>Row</th><th>Advantage in Wild Habitat</th><th>Disadvantage in Wild Habitat</th></tr>
                    <tr><td><b>A</b></td><td>Produces high genetic variation</td><td>Requires two matching parent organisms</td></tr>
                    <tr><td><b>B</b></td><td>Allows rapid population establishment</td><td>Offspring are genetically identical, risking disease vulnerability</td></tr>
                    <tr><td><b>C</b></td><td>Promotes widespread seed dispersal</td><td>Demands heavy energy input to form pollen vectors</td></tr>
                    <tr><td><b>D</b></td><td>Increases species adaptation potential</td><td>Resulting plants fail to achieve maturity</td></tr>
                </table>
            `,
            options: { A: "Row A", B: "Row B", C: "Row C", D: "Row D" },
            correct: "B",
            trap: "Asexual reproduction creates exact genetic clones. While this allows a well-adapted organism to populate an area quickly without finding a mate, the lack of genetic variation means an entire population could be wiped out by a single disease or environmental change."
        },
        {
            id: 12,
            text: "The diagram maps a basic food web in an ecosystem. Which term describes an organism that obtains its energy by feeding on other animals only?",
            options: { A: "Carnivore", B: "Herbivore", C: "Producer", D: "Primary Consumer" },
            correct: "A",
            trap: "Herbivores eat producers (plants). Primary consumers are typically herbivores. Organisms that feed exclusively on other animals are carnivores, occupying secondary or tertiary consumer levels."
        },
        {
            id: 13,
            text: "What is an undesirable environmental consequence of dumping untreated chemical waste and raw sewage into freshwater rivers?",
            options: { 
                A: "An immediate permanent rise in dissolved oxygen levels", 
                B: "A decrease in the growth of aquatic bacterial colonies", 
                C: "Structural stabilization of local food chains", 
                D: "Eutrophication, leading to a severe reduction in aquatic biodiversity" 
            },
            correct: "D",
            trap: "Organic waste feeds decomposers and bacteria, which rapidly multiply and consume the dissolved oxygen in the water. This lack of oxygen causes other aquatic organisms to suffocate, leading to a severe loss of biodiversity (eutrophication)."
        },
        {
            id: 14,
            text: "Which process represents a purely physical change rather than a permanent chemical reaction?",
            options: { 
                A: "Burning a piece of magnesium ribbon in air", 
                B: "The fractional distillation of liquid crude oil", 
                C: "The thermal decomposition of solid calcium carbonate", 
                D: "Electrolysis of molten lead(II) bromide" 
            },
            correct: "B",
            trap: "Fractional distillation separates hydrocarbons based on their physical boiling points without breaking or forming chemical bonds. Burning (A), thermal cracking/decomposition (C), and electrolysis (D) all alter chemical formulas and form new substances."
        },
        {
            id: 15,
            text: "A student analyzes a clear liquid compound. Which parameter provides absolute proof that the substance is entirely pure water?",
            options: { 
                A: "It boils at exactly 100°C at standard atmospheric pressure.", 
                B: "It turns anhydrous copper(II) sulfate from white to blue.", 
                C: "It exhibits a neutral pH value of 7.0 at room temperature.", 
                D: "It does not leave a solid residue when evaporated." 
            },
            correct: "A",
            trap: "Turning copper sulfate blue (B) is a chemical test for the *presence* of water, but it will happen even if the water is full of impurities. A sharp, fixed boiling point at exactly 100°C is a physical property unique to *pure* water."
        },
        {
            id: 16,
            text: "The table contains details about three separate particle structures: X, Y, and Z. What are the identities of these structures based on their subatomic counts?",
            table: `
                <table class="sub-table">
                    <tr><th>Particle</th><th>Protons</th><th>Neutrons</th><th>Electrons</th></tr>
                    <tr><td><b>X</b></td><td>11</td><td>12</td><td>11</td></tr>
                    <tr><td><b>Y</b></td><td>11</td><td>12</td><td>10</td></tr>
                    <tr><td><b>Z</b></td><td>17</td><td>18</td><td>18</td></tr>
                </table>
            `,
            options: { 
                A: "X is a sodium ion, Y is a sodium atom, Z is a chlorine atom", 
                B: "X is a sodium atom, Y is a sodium atom, Z is a chloride ion", 
                C: "X is a sodium ion, Y is a sodium ion, Z is a chlorine atom", 
                D: "X is a sodium atom, Y is a sodium ion, Z is a chloride ion" 
            },
            correct: "D",
            trap: "Check the proton-to-electron balance. Particle X has equal protons and electrons (11 each), making it a neutral atom (Sodium). Particle Y has 11 protons but only 10 electrons, giving it a 1+ charge (Sodium ion). Particle Z has 17 protons and 18 electrons, giving it a 1- charge (Chloride ion)."
        },
        {
            id: 17,
            text: "Methane (CH<sub>4</sub>) and water (H<sub>2</sub>O) are covalent molecules. Which statement correctly outlines how covalent bonds are formed?",
            options: { 
                A: "Electrons are transferred from metal atoms to non-metal atoms.", 
                B: "Non-metal atoms share pairs of valence electrons to achieve stable outer shells.", 
                C: "Electrostatic forces lock oppositely charged ion fields into giant grids.", 
                D: "Van der Waals forces link metallic atomic cores together." 
            },
            correct: "B",
            trap: "Electron transfer (A) and electrostatic attraction between ions (C) define *ionic* bonding. Covalent bonding occurs exclusively between non-metal atoms through the *sharing* of electron pairs."
        },
        {
            id: 18,
            text: "The balanced symbol chemical equation for the complete combustion of propane gas is written as: C<sub>3</sub>H<sub>8</sub> + xO<sub>2</sub> &rarr; yCO<sub>2</sub> + zH<sub>2</sub>O. What are the correct stoichiometric balancing values for coefficients x, y, and z?",
            options: { A: "x=5, y=3, z=4", B: "x=3, y=3, z=4", C: "x=5, y=4, z=3", D: "x=4, y=3, z=5" },
            correct: "A",
            trap: "Count the atoms on both sides. Propane has 3 Carbons, requiring y=3 CO<sub>2</sub>. It has 8 Hydrogens, requiring z=4 H<sub>2</sub>O. This gives a total of (3×2) + (4×1) = 10 Oxygen atoms on the right side, meaning we need x=5 O<sub>2</sub> molecules on the left."
        },
        {
            id: 19,
            text: "During the electrolysis of molten lead(II) bromide using inert carbon electrodes, what chemical products form at the anode and cathode interfaces?",
            options: { 
                A: "Anode: Lead metal metal | Cathode: Bromine gas", 
                B: "Anode: Hydrogen gas | Cathode: Oxygen gas", 
                C: "Anode: Bromine gas | Cathode: Lead metal", 
                D: "Anode: Oxygen gas | Cathode: Lead metal" 
            },
            correct: "C",
            trap: "Remember 'Don't Panic: Positive Anode, Negative Cathode' (PANIC). Negatively charged bromide ions (Anions) are attracted to the positive Anode, where they lose electrons to form bromine gas. Positively charged lead ions (Cations) travel to the negative Cathode, where they gain electrons to form liquid lead metal."
        },
        {
            id: 20,
            text: "An industrial process monitors thermal shifts during chemical changes. Which statement correctly identifies endothermic and exothermic profiles?",
            options: { 
                A: "Endothermic reactions release thermal energy; the surrounding temperature climbs.", 
                B: "Exothermic reactions release thermal energy; the surrounding temperature climbs.", 
                C: "Endothermic reactions involve bond-making steps only.", 
                D: "Exothermic processes absorb energy to cleave complex molecular arrays." 
            },
            correct: "B",
            trap: "*Exo*thermic reactions exit/release heat into the surroundings, causing temperatures to rise. *Endo*thermic reactions take in heat from the surroundings, causing a temperature drop. Remember: bond-breaking is endothermic, while bond-making is exothermic."
        },
        {
            id: 21,
            text: "Which modification will cause an increase in the initial rate of a chemical reaction between solid zinc granules and dilute hydrochloric acid?",
            options: { 
                A: "Cooling the acid mixture down to reduce thermal energy levels", 
                B: "Adding water to dilute the initial concentration of the acid", 
                C: "Grinding the zinc granules into a fine powder to increase surface area", 
                D: "Using a larger beaker to increase the total volume space" 
            },
            correct: "C",
            trap: "Grinding the zinc into a powder increases the available surface area. This exposes more zinc atoms to the acid at once, leading to more frequent collisions per second. Diluting the acid (B) or cooling it down (A) would slow the reaction rate."
        },
        {
            id: 22,
            text: "Copper(II) sulfate is a soluble salt. It can be prepared by reacting insoluble copper(II) oxide powder with warm dilute sulfuric acid. What is the correct sequence of laboratory stages to obtain clean, dry crystals of the salt?",
            options: { 
                A: "Evaporation &rarr; Filtration &rarr; Crystallisation", 
                B: "Filtration &rarr; Distillation &rarr; Titration", 
                C: "Crystallisation &rarr; Chromatography &rarr; Evaporation", 
                D: "Reaction &rarr; Filtration &rarr; Evaporation/Crystallisation" 
            },
            correct: "D",
            trap: "Because excess insoluble copper oxide is added to ensure all the acid reacts, this unreacted solid must be removed via filtration *before* evaporating the solution. Evaporating the filtered solution triggers crystallisation."
        },
        {
            id: 23,
            text: "Which descriptive test result confirms the presence of aqueous chloride ions in a solution?",
            options: { 
                A: "Adding dilute nitric acid followed by aqueous silver nitrate yields a white precipitate.", 
                B: "Adding aqueous sodium hydroxide yields a light blue precipitate.", 
                C: "Adding dilute hydrochloric acid causes effervescence of a gas that turns limewater milky.", 
                D: "A damp red litmus paper segment shifts immediately to dark blue." 
            },
            correct: "A",
            trap: "The standard test for halide ions involves adding silver nitrate. Chloride ions form an insoluble white precipitate of silver chloride (AgCl). Option B is the test for copper(II) ions, and Option C is the test for carbonate ions."
        },
        {
            id: 24,
            text: "The diagram shows a section of the Periodic Table. How do metallic properties and Group trends shift as you move across a period from left to right, and down a group?",
            options: { 
                A: "Metallic character decreases across a period and increases down a group.", 
                B: "Metallic character increases across a period and decreases down a group.", 
                C: "Metallic character decreases across a period and decreases down a group.", 
                D: "Metallic character increases across a period and increases down a group." 
            },
            correct: "A",
            trap: "Elements shift from metals (left) to non-metals (right) across a period, meaning metallic character decreases. Descending a group, elements can more easily shed valence electrons, which increases metallic character."
        },
        {
            id: 25,
            text: "Why are noble gases, such as argon and helium, chemically unreactive and found as monoatomic gases?",
            options: { 
                A: "They contain an odd number of nuclear protons.", 
                B: "They form extremely strong diatomic covalent pairs.", 
                C: "They possess a stable, full outer shell of valence electrons.", 
                D: "Their boiling points sit near absolute zero." 
            },
            correct: "C",
            trap: "Noble gases already have a full outer valence shell (an octet, or a duet for helium). Because they are stable, they do not need to share, gain, or lose electrons by bonding with other atoms."
        },
        {
            id: 26,
            text: "Which row matches the properties of a typical transition element, such as iron or copper, compared to an alkali metal like sodium?",
            table: `
                <table class="sub-table">
                    <tr><th>Option</th><th>Density Comparison</th><th>Melting Point Comparison</th><th>Chemical Compounds Status</th></tr>
                    <tr><td><b>A</b></td><td>Lower density</td><td>Lower melting point</td><td>Form white compounds only</td></tr>
                    <tr><td><b>B</b></td><td>Lower density</td><td>Higher melting point</td><td>Form colored compounds</td></tr>
                    <tr><td><b>C</b></td><td>Higher density</td><td>Lower melting point</td><td>Form white compounds only</td></tr>
                    <tr><td><b>D</b></td><td>Higher density</td><td>Higher melting point</td><td>Form colored compounds</td></tr>
                </table>
            `,
            options: { A: "Row A", B: "Row B", C: "Row C", D: "Row D" },
            correct: "D",
            trap: "Transition metals are much denser and have significantly higher melting points than soft Group I alkali metals. They are also known for their ability to form characteristically colored compounds (such as blue copper compounds or green/brown iron compounds)."
        },
        {
            id: 27,
            text: "A student passes clean air through an analytical tube network. What is the approximate percentage composition of nitrogen and oxygen gases in a clean sample of dry atmospheric air?",
            options: { 
                A: "78% Oxygen, 21% Nitrogen",

                D: "98% Nitrogen, 1% Oxygen"

            trap: "Do not mix up the values for these two gases under pressure. Nitrogen makes up the largest share of our atmosphere at roughly 78%, while oxygen accounts for about 21%."
        },
        {
            id: 28,
            text: "A runner covers a path on a track. The motion is plotted on a distance-time graph. The line is linear and climbs at a steady diagonal slope. What does the gradient of this distance-time graph represent?",
            options: { A: "Acceleration", B: "Speed", C: "Total distance covered", D: "Time intervals consumed" },
            correct: "B",
            trap: "The gradient (slope) of a *distance-time* graph represents speed. On a *speed-time* graph, the gradient represents acceleration. Mixing up these two types of graphs is a very common exam error."

        {
            id: 29,
            text: "A solid rectangular brick weighs 48 N and has dimensions of 0.10 m &times; 0.20 m &times; 0.40 m. What is the maximum pressure the brick can exert on a flat floor surface when stood on one of its faces?",
            options: { A: "600 Pa", B: "1200 Pa", C: "2400 Pa", D: "4800 Pa" },
            correct: "C",
            trap: "To find the *maximum* pressure, use the *smallest* surface area face ($P = F / A$). The smallest face area is $0.10\text{ m} \times 0.20\text{ m} = 0.02\text{ m}^2$. Calculating pressure: $48\text{ N} / 0.02\text{ m}^2 = 2400\text{ Pa}$. Using the largest face would give you the minimum pressure instead."
        },
        {
            id: 30,
            text: "An energy resource analysis assesses power generation metrics. Which energy resource does not rely on energy initially radiated from the Sun?",
            options: { A: "Biofuels", B: "Hydroelectric power plants", C: "Wind turbines", D: "Geothermal power installations" },
            correct: "D",
            trap: "Wind, hydro, and biofuels all trace their energy back to the Sun (which drives weather patterns, the water cycle, and photosynthesis). Geothermal energy relies entirely on radioactive decay and heat trapped deep within the Earth's core."
        },
        {
            id: 31,
            text: "A liquid is heated in a beaker. The molecules escape from the surface of the liquid below its boiling point. What is the name of this process and how does it affect the temperature of the remaining liquid?",
            options: { 
                A: "Evaporation; it lowers the temperature of the remaining liquid.", 
                B: "Boiling; it raises the temperature of the remaining liquid.", 
                C: "Evaporation; it raises the temperature of the remaining liquid.", 
                D: "Boiling; it keeps the temperature completely constant." 
            },
            correct: "A",
            trap: "This process is evaporation. Because only the fastest, most energetic molecules escape from the liquid's surface, the average kinetic energy of the remaining molecules drops, lowering the overall temperature of the liquid."
        },
        {
            id: 32,
            text: "How is thermal energy transferred through a vacuum in outer space, such as the energy reaching Earth from the Sun?",
            options: { A: "Conduction only", B: "Convection only", C: "Radiation only", D: "Conduction and Convection combined" },
            correct: "C",
            trap: "Conduction and convection both require a physical material (particles) to transfer heat. Because space is a vacuum, thermal energy can only travel through it via electromagnetic infrared waves (radiation)."
        },
        {
            id: 33,
            text: "A wave traveling along a stretched rope shows a peak-to-peak distance of 2.0 meters between two consecutive crests. If 10 complete crests pass a fixed point in 5.0 seconds, what are the wavelength and frequency of the wave?",
            options: { 
                A: "Wavelength = 1.0 m | Frequency = 2.0 Hz", 
                B: "Wavelength = 2.0 m | Frequency = 2.0 Hz", 
                C: "Wavelength = 2.0 m | Frequency = 0.5 Hz", 
                D: "Wavelength = 4.0 m | Frequency = 10 Hz"

            correct: "B",
            trap: "The distance between consecutive crests is the definition of wavelength (2.0 m). Frequency is the number of complete waves passing a point per second ($10 \text{ waves} / 5.0 \text{ seconds} = 2.0 \text{ Hz}$)."
        },
        {
            id: 34,
            text: "A student stands 1.5 meters directly in front of a vertical plane mirror. What is the total distance between the student and their reflected image?",
            options: { A: "1.5 meters", B: "3.0 meters", C: "0 meters", D: "4.5 meters" },
            correct: "B",
            trap: "The image appears as far behind the mirror as the object is in front of it (1.5 m). Therefore, the total distance from the student to their image is $1.5\text{ m} + 1.5\text{ m} = 3.0\text{ meters}$."
        },
        {
            id: 35,
            text: "White light passes through a glass prism and splits into a spectrum of colors. What is the name of this phenomenon and which color refracts (bends) the most?",
            options: { 
                A: "Dispersion; violet light bends the most.", 
                B: "Diffraction; red light bends the most.", 
                C: "Dispersion; red light bends the most.", 
                D: "Refraction; green light stops bending." 
            },
            correct: "A",
            trap: "Splitting light into its component colors is called *dispersion*. Violet light has a shorter wavelength and slows down the most in glass, meaning it refracts (bends) the most. Red light bends the least."
        },
        {
            id: 36,
            text: "Which row correctly identifies the typical speed of sound waves traveling through air, pure liquid water, and a solid iron bar?",
            table: `
                <table class="sub-table">

                    <tr><td><b>A</b></td><td>1500</td><td>330</td><td>5000</td></tr>
                    <tr><td><b>B</b></td><td>5000</td><td>1500</td><td>330</td></tr>
                    <tr><td><b>C</b></td><td>330</td><td>1500</td><td>5000</td></tr>
                    <tr><td><b>D</b></td><td>330</td><td>5000</td><td>1500</td></tr>
                </table>
            `,
            options: { A: "Row A", B: "Row B", C: "Row C", D: "Row D" },
            correct: "C",
            trap: "Sound travels faster in denser materials where particles are tightly packed together. It travels slowest in gases (~330 m/s), faster in liquids (~1500 m/s), and fastest in solids (~5000 m/s)."
        },
        {
            id: 37,
            text: "A plastic rod becomes negatively charged when rubbed vigorously with a dry wool cloth. Which statement explains how the rod becomes charged?",
            options: { 
                A: "Protons migrate from the cloth onto the rod.",

                C: "Protons are destroyed inside the plastic material matrix.", 
                D: "Electrons migrate from the cloth onto the rod." 
            },
            correct: "D",

        {
            id: 38,
            text: "A simple electrical circuit contains a 12V battery connected to a single resistor. An ammeter shows a current reading of 3.0 A. How much electrical energy is transferred in the circuit over a period of 2.0 minutes?",
            options: { A: "72 J", B: "4320 J", C: "36 J", D: "2160 J" },
            correct: "B",
            trap: "Always convert time into seconds first: $2.0 \text{ minutes} = 120 \text{ seconds}$. Use the electrical energy formula $E = V \times I \times t$: $12\text{ V} \times 3.0\text{ A} \times 120\text{ s} = 4320\text{ Joules}$. Forgetting to convert minutes to seconds leads straight to the trap answer of 72 J."
        },
        {
            id: 39,
            text: "Two identical 6.0 $\Omega$ resistors are connected in a parallel network. What is the total combined effective resistance of this parallel combination?",
            options: { A: "3.0 $\Omega$", B: "6.0 $\Omega$", C: "12 $\Omega$", D: "0.33 $\Omega$" },
            correct: "A",
            trap: "Connecting resistors in parallel creates extra paths for the current, which always *lowers* the total resistance. For two identical resistors in parallel, the total resistance is exactly half of one resistor ($6.0\,\Omega / 2 = 3.0\,\Omega$). Adding them together (12 $\Omega$) is the rule for series circuits, not parallel."
        },
        {
            id: 40,
            text: "An electrical appliance is fitted with a safety fuse. Which statement correctly explains the installation position and function of a fuse?",
            options: { 
                A: "It is placed in the neutral wire and melts if the current becomes too small.",

                C: "It is placed in the earth wire and insulates the outer casing structure.", 
                D: "It is placed in the live wire and melts to break the circuit if the current exceeds a safe limit." 
            },
            correct: "D",
            trap: "Fuses must always be installed in the *live wire* to cut off the high voltage supply before it reaches the appliance. Its purpose is to melt and break the circuit safely if a fault causes the current to spike dangerously high."
        }

    function startReview() {
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('review-screen').classList.remove('hidden');
        buildQuizCards();
    }

    function buildQuizCards() {
        const container = document.getElementById('questions-list');
        container.innerHTML = '';

        quizData.forEach((q) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${q.id}`;

            let dynamicTable = q.table ? q.table : '';

            card.innerHTML = `
                <div class="q-meta">Question ${q.id}</div>
                <div class="q-text">${q.text}</div>
                ${dynamicTable}
                <div class="options-grid">
                    <div class="option-item ${q.correct === 'A' ? 'correct' : ''}"><b>A:</b> ${q.options.A}</div>
                    <div class="option-item ${q.correct === 'B' ? 'correct' : ''}"><b>B:</b> ${q.options.B}</div>
                    <div class="option-item ${q.correct === 'C' ? 'correct' : ''}"><b>C:</b> ${q.options.C}</div>
                    <div class="option-item ${q.correct === 'D' ? 'correct' : ''}"><b>D:</b> ${q.options.D}</div>
                </div>
                <div class="action-area">
                    <button class="btn-reveal" onclick="revealCard(${q.id}, this)">Reveal Answer & Trap Analysis</button>
                </div>
                <div class="analysis-box hidden" id="analysis-${q.id}">
                    <div class="analysis-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        Concept Breakdown & Pitfalls
                    </div>
                    <div>${q.trap}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function revealCard(id, buttonEl) {
        const card = document.getElementById(`q-card-${id}`);
        const analysisBox = document.getElementById(`analysis-${id}`);
        
        card.classList.add('revealed');
        analysisBox.classList.remove('hidden');
        buttonEl.classList.add('hidden');
    }
</script>
