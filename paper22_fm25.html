<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untimed Review: Science Paper 22 (Feb/Mar 2025)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #F4F7F6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        
        .quiz-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 750px;
            width: 90%;
            text-align: left;
            position: relative;
        }

        h1 {
            font-size: 1.4rem;
            color: #8892B0;
            margin-top: 0;
            border-bottom: 2px solid #E2E8F0;
            padding-bottom: 10px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 800;
            color: #2D3748;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin-bottom: 30px;
        }

        .option-item {
            background-color: #EDF2F7;
            margin: 10px 0;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 1.1rem;
            color: #4A5568;
            border-left: 4px solid #CBD5E0;
            transition: all 0.3s ease;
        }

        /* Highlight for the correct answer */
        .option-item.highlight-correct {
            background-color: #d4edda;
            border-left: 6px solid #28a745;
            color: #155724;
            font-weight: 800;
            transform: scale(1.02);
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.15);
        }

        .answer-box {
            background-color: #FFF5F5;
            border-left: 5px solid #E53E3E;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .answer-title {
            font-weight: 800;
            color: #C53030;
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #2D3748;
        }

        .btn-start, .btn-reveal, .btn-next {
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            width: 100%;
        }

        .btn-start { background-color: #4299E1; }
        .btn-start:hover { background-color: #3182CE; }

        .btn-reveal { background-color: #805AD5; }
        .btn-reveal:hover { background-color: #6B46C1; }

        .btn
