<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Combined Science 0653/22 Feb/Mar 2025</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { background: #3182ce; color: white; padding: 15px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        .hidden { display: none; }
        .q-box { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 15px; }
        .correct { color: #2f855a; font-weight: bold; }
        .trap { color: #c53030; font-size: 0.9rem; font-style: italic; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>Combined Science 0653/22</h1>
        <h3>Feb/Mar 2025 - Instant Review</h3>
        <button class="btn" onclick="start()">Start Review</button>
        <div id="quiz" class="hidden"></div>
    </div>
    <script>
        const data = [
            {q: "1. Living organism characteristic for taking in materials?", a: "B: Nutrition", t: "Respiration releases energy but doesn't take in materials."},
            {q: "2. Bacterial cells have what animal cells don't?", a: "D: Plasmids and cell wall", t: "Bacteria have cell walls; animal cells do not."},
            {q: "3. Plant cell in concentrated salt solution?", a: "B: Net movement out, becomes flaccid", t: "Turgid only happens in dilute solutions."},
            {q: "4. Enzyme peak effectiveness?", a: "C: Label C", t: "A and D are where the enzyme begins to denature."},
            {q: "5. CO2 needed for 5 glucose?", a: "C: 30", t: "6 CO2 are needed for 1 glucose (6 x 5 = 30)."},
            {q: "6. Structure X (Pancreas) action?", a: "B: Pancreas, amylase, starch to sugars", t: "The liver produces bile, not enzymes."},
            {q: "7. Root hair cell large surface area function?", a: "A: Increase mineral uptake by active transport", t: "Water uptake is by osmosis, not active transport."},
            {q: "8. Pumping blood to lungs?", a: "D: Right atrium relaxes, right ventricle contracts", t: "Left side pumps to the body, right to the lungs."},
            {q: "9. Breathing system structures (P=alveolus, S=RBC)?", a: "A", t: "R and S are inside the capillary (Q)."},
            {q: "10. Molecule broken down in aerobic respiration?", a: "B: Glucose", t: "Starch/Glycogen must be converted to glucose first."},
            {q: "11. Insect vs Wind pollinated adaptations?", a: "A: Insect=colourful petals, Wind=exposed anthers", t: "Wind-pollinated stigmas are feathery, not sticky."},
            {q: "12. Consumers?", a: "A: Feed on other organisms for energy", t: "Consumers do not perform photosynthesis."},
            {q: "13. Conservation methods?", a: "C: 1, 3, and 4 (Captive breeding, monitoring, habitat protection)", t: "Introducing new species can be invasive."},
            {q: "14. Energy change from solid to liquid?", a: "D: Overcomes attractive forces", t: "Energy isn't used to raise temperature during melting."},
            {q: "15. Atomic numbers differ by 9?", a: "C: Different periods", t: "Difference of 9 almost always spans periods."},
            {q: "16. NaCl statement not correct?", a: "D: Share pairs of electrons", t: "NaCl is ionic, not covalent (no sharing)."},
            {q: "17. CO2 dot-and-cross?", a: "A: C=O double bonds", t: "Don't forget the lone pairs on the oxygens."},
            {q: "18. Balanced equation for CaCO3 + HCl?", a: "C: CaCO3(s) + 2HCl(aq) -> CaCl2(aq) + CO2(g) + H2O(l)", t: "Must be balanced with 2HCl."},
            {q: "19. Property of compound R (conducts when dissolved)?", a: "D: Ionic, metal and non-metal", t: "Covalent compounds do not conduct when dissolved."},
            {q: "20. Activation energy for endothermic?", a: "B: Label B", t: "A is the reactant energy."},
            {q: "21. Rate of reaction apparatus?", a: "B: Syringe setup", t: "The gas must be collected and measured in a sealed system."},
            {q: "22. Metal halide formed (MP 769, BP -35)?", a: "C: Strontium chloride", t: "Check the halogen boiling point trend."},
            {q: "23. Chemical test for water?", a: "B: Cobalt(II) chloride turns pink", t: "Copper(II) sulfate turns white to blue (not white)."},
            {q: "24. Chromatography conclusions?", a: "A: 1 and 2", t: "Rf values need careful calculation."},
            {q: "25. Identify ions in FeSO4?", a: "D: 2 and 3 (Barium for sulfate, NaOH for iron)", t: "Silver nitrate is for chlorides."},
            {q: "26. Lilac flame in water?", a: "C: Potassium", t: "Sodium produces a yellow-orange flame."},
            {q: "27. CO2 global warming?", a: "A: 1 and 2", t: "Acid rain is from sulfur dioxide, not CO2."},
            {q: "28. Weight on Mars?", a: "C: 296 N", t: "Calculate mass (W/g) first, then multiply by Mars g."},
            {q: "29. Equal kinetic energies (1/2mv^2)?", a: "D: R and S", t: "Don't forget to square the velocity."},
            {q: "30. Mass of block (Density x Volume)?", a: "D: 420g", t: "Calculate full volume (3x5x4) first."},
            {q: "31. Liquid evaporation?", a: "C: More energetic leave, temp decreases", t: "Evaporation has a cooling effect."},
            {q: "32. Why are metals good conductors?", a: "A: Delocalised electrons", t: "Shiny surfaces don't cause conduction."},
            {q: "33. States of matter in diagram?", a: "B: Gas and solid", t: "Must look for both lattice and random spacing."},
            {q: "34. Wave amplitude and wavelength?", a: "D: Q, S", t: "Amplitude is peak height; wavelength is peak-to-peak distance."},
            {q: "35. Longitudinal/Transverse?", a: "A: Longitudinal needs medium, some transverse don't", t: "Longitudinal waves oscillate parallel."},
            {q: "36. Sound waves?", a: "B: Compressions and rarefactions", t: "Crests/troughs are for water waves."},
            {q: "37. Types of electric charge?", a: "C: Positive and negative", t: "Don't confuse with magnets."},
            {q: "38. Current (I=Q/t)?", a: "A: 0.040 A", t: "Convert 5 mins to 300 seconds."},
            {q: "39. Parallel resistance (R= (R1*R2)/(R1+R2))?", a: "B: 4.0 Ohm", t: "Don't just add them (that's series)."},
            {q: "40. Energy in stable star?", a: "D: Nuclear fusion of hydrogen", t: "Fusion powers stars, not fission."}
        ];
        function start() {
            document.querySelector('.btn').classList.add('hidden');
            const qDiv = document.getElementById('quiz');
            qDiv.classList.remove('hidden');
            data.forEach((item, i) => {
                qDiv.innerHTML += `<div class="q-box">
                    <p><strong>Q${i+1}:</strong> ${item.q}</p>
                    <p class="correct">Answer: ${item.a}</p>
                    <p class="trap">Trap: ${item.t}</p>
                </div>`;
            });
        }
    </script>
</body>
</html>
